var map=L.map('map').setView([54,-2],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var cluster=L.markerClusterGroup({
 iconCreateFunction:function(cluster){
  var count = cluster.getChildCount();
  var size = count < 10 ? 30 : count < 50 ? 40 : 50;
  return L.divIcon({
    html:`<div class="cluster-icon" style="width:${size}px;height:${size}px">${count}</div>`,
    className:'',
    iconSize:[size,size]
  });
 }
});
map.addLayer(cluster);

function getColor(y){return y==='Second Year'?'red':'blue'}

var regionChart, deptChart;
function drawCharts(rc,dc){
 if(regionChart) regionChart.destroy();
 if(deptChart) deptChart.destroy();
 var r=document.getElementById('regionChart').getContext('2d');
 var d=document.getElementById('deptChart').getContext('2d');
 regionChart=new Chart(r,{type:'bar',data:{labels:Object.keys(rc),datasets:[{data:Object.values(rc)}]}});
 deptChart=new Chart(d,{type:'bar',data:{labels:Object.keys(dc),datasets:[{data:Object.values(dc)}]}});
}

function populateFilters(){
 region.innerHTML='<option value="">All Regions</option>';
 department.innerHTML='<option value="">All Departments</option>';
 prevDepartment.innerHTML='<option value="">All Previous Departments</option>';
 year.innerHTML='<option value="">All Years</option>';
 let r=new Set(),d=new Set(),pd=new Set(),y=new Set();
 rawData.forEach(x=>{r.add(x.current_region);d.add(x.current_department);pd.add(x.previous_department);y.add(x.current_year);});
 r.forEach(v=>region.add(new Option(v,v)));
 d.forEach(v=>department.add(new Option(v,v)));
 pd.forEach(v=>prevDepartment.add(new Option(v,v)));
 y.forEach(v=>year.add(new Option(v,v)));
}

function render(){
 cluster.clearLayers();
 let rc={},dc={};
 let q=search.value.toLowerCase();
 rawData.filter(x=>x.lat && x.lon)
 .filter(x=>(!region.value||x.current_region==region.value)&&(!department.value||x.current_department==department.value)&&(!prevDepartment.value||x.previous_department==prevDepartment.value)&&(!year.value||x.current_year==year.value)&&(!q||x.name.toLowerCase().includes(q)))
 .forEach(x=>{
  rc[x.current_region]=(rc[x.current_region]||0)+1;
  dc[x.current_department]=(dc[x.current_department]||0)+1;
  let prev=(x.previous_department)?`<hr><b>Previous:</b><br>${x.previous_department} – ${x.previous_title||''}`:'';
  let emailLine = x.email ? `<br><b>Email:</b> ${x.email}` : '';
  let popup=`<b>${x.name}</b><br>${x.current_department} – ${x.current_title}<br>${x.current_city}${emailLine}${prev}`;
  cluster.addLayer(L.circleMarker([x.lat,x.lon],{radius:7,color:getColor(x.current_year),fillOpacity:0.9}).bindPopup(popup));
 });
 drawCharts(rc,dc);
}

function resetFilters(){search.value='';region.value='';department.value='';prevDepartment.value='';year.value='';render();}

// CSV upload remains available for admin override
fileUpload.addEventListener('change',function(e){
 Papa.parse(e.target.files[0],{header:true,skipEmptyLines:true,complete:function(r){rawData=r.data;populateFilters();render();}});
});

populateFilters();
render();

[search,region,department,prevDepartment,year].forEach(el=>el.oninput=render);
